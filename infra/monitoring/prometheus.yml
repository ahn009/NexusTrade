# infra/monitoring/prometheus.yml
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: nexustrade-services
    static_configs:
      - targets:
          - api-gateway:3000
          - auth-service:3001
          - user-service:3002
          - trading-service:3003
          - wallet-service:3004
          - market-data-service:3005
          - risk-engine:3006
          - deposit-service:3007
          - withdrawal-service:3008
          - compliance-service:3009
          - notification-service:3010

  - job_name: nexustrade-infra
    static_configs:
      - targets:
          - postgres:5432
          - redis:6379
          - kafka:29092
          - clickhouse:8123
          - matching-engine:50051
