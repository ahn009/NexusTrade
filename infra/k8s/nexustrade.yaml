# infra/k8s/nexustrade.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: nexustrade
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexustrade
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/example/nexustrade-api-gateway:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/v3/health
              port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nexustrade
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: nexustrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
