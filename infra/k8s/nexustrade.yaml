---
apiVersion: apps/v1
kind: Deployment
metadata: { name: matching-engine, namespace: nexustrade }
spec:
  replicas: 2
  selector: { matchLabels: { app: matching-engine } }
  template:
    metadata: { labels: { app: matching-engine } }
    spec:
      containers:
        - name: matching-engine
          image: ghcr.io/ahn009/nexustrade-matching-engine:latest
          ports: [{ containerPort: 50051 }]
          env: [{ name: MATCHING_ENGINE_SNAPSHOT_PATH, value: /data/snapshot.json }]
          resources: { requests: { cpu: 500m, memory: 512Mi }, limits: { cpu: "2", memory: 2Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: matching-engine, namespace: nexustrade }
spec: { selector: { app: matching-engine }, ports: [{ port: 50051, targetPort: 50051 }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api-gateway, namespace: nexustrade }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api-gateway }
  minReplicas: 3
  maxReplicas: 20
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } } }]
---
apiVersion: autoscaling/v2
