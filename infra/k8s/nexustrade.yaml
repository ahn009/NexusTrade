# infra/k8s/nexustrade.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: nexustrade
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexustrade-config
  namespace: nexustrade
data:
  DATABASE_HOST: nexustrade-postgres.cluster.local
  DATABASE_PORT: "5432"
  DATABASE_USER: nexus
  DATABASE_NAME: nexus
  KAFKA_BROKERS: nexustrade-msk:9092
  REDIS_URL: redis://nexustrade-redis:6379
  MATCHING_ENGINE_GRPC_URL: matching-engine:50051
  AUTH_SERVICE_URL: http://auth-service:3001
  USER_SERVICE_URL: http://user-service:3002
  TRADING_SERVICE_URL: http://trading-service:3003
  WALLET_SERVICE_URL: http://wallet-service:3004
  MARKET_DATA_SERVICE_URL: http://market-data-service:3005
  RISK_SERVICE_URL: http://risk-engine:3006
  DEPOSIT_SERVICE_URL: http://deposit-service:3007
  WITHDRAWAL_SERVICE_URL: http://withdrawal-service:3008
  COMPLIANCE_SERVICE_URL: http://compliance-service:3009
  NOTIFICATION_SERVICE_URL: http://notification-service:3010
  GATEWAY_PUBLIC_RATE_LIMIT_PER_MINUTE: "1200"
  GATEWAY_AUTH_RATE_LIMIT_PER_MINUTE: "6000"
  GATEWAY_UPSTREAM_TIMEOUT_MS: "5000"
  GATEWAY_CIRCUIT_FAILURES: "3"
  GATEWAY_CIRCUIT_OPEN_MS: "30000"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexustrade-secrets
  namespace: nexustrade
type: Opaque
stringData:
  DATABASE_PASSWORD: replace-me
  JWT_SECRET: replace-me
  SERVICE_AUTH_TOKEN: replace-me
  API_KEY_SECRET: replace-me
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: nexustrade }
spec:
  replicas: 3
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/ahn009/nexustrade-node-service:latest
          command: ["npm", "run", "start:dev", "-w", "@nexus/api-gateway"]
          ports: [{ containerPort: 3000 }]
          envFrom: [{ configMapRef: { name: nexustrade-config } }, { secretRef: { name: nexustrade-secrets } }]
          readinessProbe: { httpGet: { path: /api/v3/health, port: 3000 } }
          livenessProbe: { httpGet: { path: /api/v3/health, port: 3000 } }
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: nexustrade }
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: nexustrade }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template: &node_template_3001
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: service
          image: ghcr.io/ahn009/nexustrade-node-service:latest
          command: ["npm", "run", "start:dev", "-w", "@nexus/auth-service"]
          ports: [{ containerPort: 3001 }]
          envFrom: [{ configMapRef: { name: nexustrade-config } }, { secretRef: { name: nexustrade-secrets } }]
          readinessProbe: { httpGet: { path: /health, port: 3001 } }
          livenessProbe: { httpGet: { path: /health, port: 3001 } }
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: nexustrade }
spec: { selector: { app: auth-service }, ports: [{ port: 3001, targetPort: 3001 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: user-service, namespace: nexustrade }
spec:
  replicas: 2
  selector: { matchLabels: { app: user-service } }
  template:
    metadata: { labels: { app: user-service } }
    spec:
      containers:
        - name: service
          image: ghcr.io/ahn009/nexustrade-node-service:latest
          command: ["npm", "run", "start:dev", "-w", "@nexus/user-service"]
          ports: [{ containerPort: 3002 }]
          envFrom: [{ configMapRef: { name: nexustrade-config } }, { secretRef: { name: nexustrade-secrets } }]
          readinessProbe: { httpGet: { path: /health, port: 3002 } }
          livenessProbe: { httpGet: { path: /health, port: 3002 } }
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: user-service, namespace: nexustrade }
spec: { selector: { app: user-service }, ports: [{ port: 3002, targetPort: 3002 }] }
---
apiVersion: apps/v1
