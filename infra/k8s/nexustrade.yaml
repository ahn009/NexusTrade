          envFrom: [{ configMapRef: { name: nexustrade-config } }, { secretRef: { name: nexustrade-secrets } }]
          readinessProbe: { httpGet: { path: /health, port: 3003 } }
          livenessProbe: { httpGet: { path: /health, port: 3003 } }
          resources: { requests: { cpu: 200m, memory: 512Mi }, limits: { cpu: "1", memory: 1Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: trading-service, namespace: nexustrade }
spec: { selector: { app: trading-service }, ports: [{ port: 3003, targetPort: 3003 }] }
