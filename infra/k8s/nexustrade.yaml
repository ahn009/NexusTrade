        - name: frontend
          image: ghcr.io/ahn009/nexustrade-node-service:latest
          command: ["npm", "run", "dev", "-w", "@nexus/frontend"]
          ports: [{ containerPort: 3020 }]
          env: [{ name: NEXT_PUBLIC_API_BASE_URL, value: /api/v3 }]
          readinessProbe: { httpGet: { path: /, port: 3020 } }
          livenessProbe: { httpGet: { path: /, port: 3020 } }
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
