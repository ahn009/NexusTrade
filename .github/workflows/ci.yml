# .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run lint --if-present
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Build node service image
        run: docker build -f infra/docker/node-service.Dockerfile -t nexustrade-node-service:${{ github.sha }} .
      - name: Scan node service image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: nexustrade-node-service:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  matching-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --manifest-path services/matching-engine/Cargo.toml
      - run: docker build -f infra/docker/rust-matching.Dockerfile -t nexustrade-matching:${{ github.sha }} .
      - name: Scan matching image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: nexustrade-matching:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
