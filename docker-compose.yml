# docker-compose.yml
x-node-service: &node-service
  build:
    context: .
    dockerfile: infra/docker/node-service.Dockerfile
  depends_on:
    - postgres
    - redis
    - kafka
  environment:
    DATABASE_HOST: postgres
    DATABASE_PORT: 5432
    DATABASE_USER: nexus
    DATABASE_PASSWORD: nexus
    DATABASE_NAME: nexus
    JWT_SECRET: ${JWT_SECRET:-local-jwt-secret-change-me}
    SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN:-local-service-token}
    API_KEY_SECRET: ${API_KEY_SECRET:-local-api-key-secret}
    KAFKA_BROKERS: kafka:29092
    REDIS_URL: redis://redis:6379
    MATCHING_ENGINE_GRPC_URL: matching-engine:50051
    WALLET_SERVICE_URL: http://wallet-service:3004
    AUTH_SERVICE_URL: http://auth-service:3001
    TRADING_SERVICE_URL: http://trading-service:3003
    MARKET_DATA_SERVICE_URL: http://market-data-service:3005

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/src/migrations/1717900000000-initial-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  clickhouse:
    image: clickhouse/clickhouse-server:24.5
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  matching-engine:
    build:
      context: .
      dockerfile: infra/docker/rust-matching.Dockerfile
    environment:
      MATCHING_ENGINE_SNAPSHOT_PATH: /data/matching-engine.snapshot.json
    ports:
      - "50051:50051"
    volumes:
      - matching_data:/data

  api-gateway:
    <<: *node-service
    command: npm run start:dev -w @nexus/api-gateway
    ports:
      - "3000:3000"

  auth-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/auth-service
    ports:
      - "3001:3001"

  user-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/user-service
    ports:
      - "3002:3002"

  trading-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/trading-service
    depends_on:
      - postgres
      - redis
      - kafka
      - matching-engine
      - wallet-service
    ports:
      - "3003:3003"

  wallet-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/wallet-service
    ports:
      - "3004:3004"

  market-data-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/market-data-service
    ports:
      - "3005:3005"

  risk-engine:
    <<: *node-service
    command: npm run start:dev -w @nexus/risk-engine
    ports:
      - "3006:3006"

  deposit-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/deposit-service
    ports:
      - "3007:3007"

  withdrawal-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/withdrawal-service
    ports:
      - "3008:3008"

  compliance-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/compliance-service
    ports:
      - "3009:3009"

  notification-service:
    <<: *node-service
    command: npm run start:dev -w @nexus/notification-service
    ports:
      - "3010:3010"

  frontend:
    <<: *node-service
    command: npm run dev -w @nexus/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api/v3
    ports:
      - "3020:3020"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/nexustrade.json:ro
      - ./infra/monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./infra/monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/nexustrade.yml:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  matching_data:
  prometheus_data:
  grafana_data:
